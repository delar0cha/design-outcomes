<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
window.setMeta = function(opts) {
  const set = (sel, attr, val) => { const el = document.querySelector(sel); if (el) el.setAttribute(attr, val); };
  if (opts.title)       { document.title = opts.title + ' — Design Outcomes'; set('meta[property="og:title"]','content',opts.title); set('meta[name="twitter:title"]','content',opts.title); }
  if (opts.description) { set('meta[property="og:description"]','content',opts.description); set('meta[name="twitter:description"]','content',opts.description); }
  if (opts.image)       { set('meta[property="og:image"]','content',opts.image); set('meta[name="twitter:image"]','content',opts.image); }
  if (opts.url)         { set('meta[property="og:url"]','content',opts.url); }
};
</script>
<script src="data/content.js"></script>
<script src="components/utils.js"></script>
<script type="text/babel" src="components/Logo.jsx"></script>
<script type="text/babel" src="components/Illustration.jsx"></script>
<script type="text/babel" src="components/Footer.jsx"></script>
<script type="text/babel" src="components/Landing.jsx"></script>
<script type="text/babel" src="components/Post.jsx"></script>
<script type="text/babel" src="components/About.jsx"></script>
<script type="text/babel" src="components/Work.jsx"></script>
<script type="text/babel" src="components/CaseStudy.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroLayout": "framed"
}/*EDITMODE-END*/;

// Path-based router using history API
const parseRoute = () => {
  const p = window.location.pathname;
  const m = p.match(/^\/post\/(.+)$/);
  if (m) return { name:'post', slug: m[1] };
  const w = p.match(/^\/work\/(.+)$/);
  if (w) return { name:'casestudy', slug: w[1] };
  if (p === '/about') return { name:'about' };
  if (p === '/work') return { name:'work' };
  return { name:'home' };
};

const useRoute = () => {
  const [route, setRoute] = useState(parseRoute);
  useEffect(()=>{
    const onPop = () => setRoute(parseRoute());
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  },[]);
  const navigate = (to) => {
    history.pushState({}, '', to);
    setRoute(parseRoute());
    window.scrollTo({top:0, behavior:'instant'});
  };
  return { route, navigate };
};

const Tweaks = ({ visible, tweaks, setTweaks }) => {
  if (!visible) return null;
  const set = (k, v) => {
    setTweaks(t => ({ ...t, [k]: v }));
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v }}, '*'); } catch(_){}
  };
  return (
    <div className="do-tweaks">
      <div className="do-tweaks-head">
        <h4>Tweaks</h4>
        <span>Live</span>
      </div>
      <div className="do-tweaks-row">
        <div className="do-tweaks-label">Hero layout</div>
        <div className="do-tweaks-seg">
          <button className={tweaks.heroLayout==='bleed'?'is-on':''} onClick={()=>set('heroLayout','bleed')}>Full-bleed</button>
          <button className={tweaks.heroLayout==='framed'?'is-on':''} onClick={()=>set('heroLayout','framed')}>Framed</button>
        </div>
      </div>
      <p className="do-tweaks-hint">Full-bleed lets the illustration carry. Framed gives a gallery feel.</p>
    </div>
  );
};

const App = () => {
  const { route, navigate } = useRoute();
  const [tweaks, setTweaks] = useState(TWEAKS_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => {
    // Expose navigate globally so child components can do client-side routing
    window.navigate = navigate;
  }, [navigate]);

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode')   setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(_){}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const openPost = (slug) => navigate(`/post/${slug}`);
  const goHome = () => navigate('/');
  const goAbout = () => navigate('/about');

  return (
    <>
      {route.name === 'home'
        ? <window.Landing onOpen={openPost} onAbout={goAbout} heroLayout={tweaks.heroLayout}/>
        : route.name === 'about'
        ? <window.About onHome={goHome}/>
        : route.name === 'work'
        ? <window.Work onHome={goHome}/>
        : route.name === 'casestudy'
        ? <window.CaseStudy slug={route.slug} onHome={goHome}/>
        : <window.Post slug={route.slug} onOpen={openPost} onHome={goHome}/>}
      <Tweaks visible={tweaksVisible} tweaks={tweaks} setTweaks={setTweaks}/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
