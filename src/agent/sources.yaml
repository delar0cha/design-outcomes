# Field Notes source registry
#
# Tier values:         priority, standard, low_frequency, meta_source
# Content_type values: explicit_tactics_likely, mixed, mostly_inferred
# Category values:     company_blog, designer_personal_site, newsletter,
#                      conference, podcast, agency, community, meta_source,
#                      design_leader
#
# Optional fields:
#   rss           Direct feed URL when verified. Leave null to fall back to
#                 page-listing scraping. RSS is always preferred since it
#                 delivers clean post URLs without the nav/marketing noise of
#                 listing-page scraping.
#   path_pattern  Substring that must appear in a candidate URL's path for it
#                 to be considered a post. Only used by the page-scrape
#                 fallback; ignored when an RSS feed is present. Set this for
#                 sites whose posts live under a known prefix (e.g. Linear's
#                 posts live under /now/).

